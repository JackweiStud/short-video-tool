[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end tests (deselect with '-m "not e2e"')

[coverage:run]
omit =
    */venv/*
    */tests/*
    */__pycache__/*
    verify_*.py
    test_*.py.bak
    main.py
    embed_subtitles.py
    config.py
