<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560">
  <defs>
    <!-- Filters -->
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000066"/>
    </filter>
    <filter id="neon-line" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="icon-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background gradient -->
    <linearGradient id="bg2" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1145"/>
      <stop offset="100%" stop-color="#0b0d1e"/>
    </linearGradient>

    <!-- Pipeline bar gradient -->
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="15%" stop-color="#00bcd4"/>
      <stop offset="35%" stop-color="#2196f3"/>
      <stop offset="55%" stop-color="#7c4dff"/>
      <stop offset="75%" stop-color="#e040fb"/>
      <stop offset="90%" stop-color="#ff4081"/>
      <stop offset="100%" stop-color="#76ff03"/>
    </linearGradient>

    <!-- Card gradient fills -->
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b3a2e"/>
      <stop offset="100%" stop-color="#0f1a15"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2010"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102640"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#120a28"/>
    </linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0825"/>
      <stop offset="100%" stop-color="#1a0518"/>
    </linearGradient>
    <linearGradient id="c6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2a2a"/>
      <stop offset="100%" stop-color="#051a1a"/>
    </linearGradient>
    <linearGradient id="c7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2510"/>
      <stop offset="100%" stop-color="#1a1808"/>
    </linearGradient>

    <!-- Hex grid pattern -->
    <pattern id="hex" width="50" height="43.3" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <polygon points="25,0 50,14.4 50,28.9 25,43.3 0,28.9 0,14.4" fill="none" stroke="#1a1a3a" stroke-width="0.3"/>
    </pattern>

    <!-- Arrow marker -->
    <marker id="arr2" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M 0 0 L 14 5 L 0 10 Z" fill="#00e5ff" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1600" height="560" fill="url(#bg2)"/>
  <rect width="1600" height="560" fill="url(#hex)" opacity="0.4"/>

  <!-- Ambient glow spots (disabled) -->

  <!-- ====== TITLE ====== -->
  <text x="800" y="40" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="22" font-weight="800" text-anchor="middle" fill="#e8e8e8" letter-spacing="5">
    跨平台短视频智能剪辑与翻译工具
  </text>
  <text x="800" y="62" font-family="'SF Pro Display',sans-serif" font-size="12" text-anchor="middle" fill="#5566aa" letter-spacing="6">
    CROSS-PLATFORM SHORT VIDEO INTELLIGENT CLIPPING &amp; TRANSLATION
  </text>

  <!-- ====== PIPELINE BAR ====== -->
  <rect x="60" y="195" width="1480" height="4" rx="2" fill="url(#pipeline)" opacity="0.6" filter="url(#neon-line)"/>

  <!-- ====== STEP NODES ON PIPELINE ====== -->
  <!-- Node positions: 100, 310, 520, 730, 940, 1150, 1360 (centered on circles) -->

  <!-- Node 1: Start -->
  <g>
    <circle cx="100" cy="197" r="16" fill="#0f0c29" stroke="#00e676" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="100" y="202" font-size="14" text-anchor="middle" fill="#00e676">🎬</text>
    <!-- Card above -->
    <g filter="url(#card-shadow)">
      <rect x="30" y="85" width="140" height="80" rx="14" fill="url(#c1)" stroke="#00e676" stroke-width="1.5"/>
      <text x="100" y="112" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#00e676">开始</text>
      <text x="100" y="132" font-family="'PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="#88aa88">输入视频 URL</text>
      <text x="100" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#557755">支持多平台</text>
    </g>
    <!-- Connector line from card to node -->
    <line x1="100" y1="165" x2="100" y2="181" stroke="#00e676" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 2: Download -->
  <g>
    <circle cx="310" cy="197" r="16" fill="#0f0c29" stroke="#ff9800" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="310" y="202" font-size="14" text-anchor="middle" fill="#ff9800">📥</text>
    <g filter="url(#card-shadow)">
      <rect x="230" y="85" width="160" height="80" rx="14" fill="url(#c2)" stroke="#ff9800" stroke-width="1.5"/>
      <text x="310" y="110" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ffb74d">模块 1</text>
      <text x="310" y="130" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#cc9955">视频下载</text>
      <text x="310" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#886633">自动下载 · 提取元数据</text>
    </g>
    <line x1="310" y1="165" x2="310" y2="181" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 3: Analyze -->
  <g>
    <circle cx="520" cy="197" r="16" fill="#0f0c29" stroke="#2196f3" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="520" y="202" font-size="14" text-anchor="middle" fill="#2196f3">🔍</text>
    <g filter="url(#card-shadow)">
      <rect x="430" y="70" width="180" height="100" rx="14" fill="url(#c3)" stroke="#2196f3" stroke-width="1.5"/>
      <text x="520" y="95" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#64b5f6">模块 2</text>
      <text x="520" y="115" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#4488cc">智能分析</text>
      <text x="520" y="135" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#336699">语音识别 ASR</text>
      <text x="520" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#336699">高潮点检测 · 场景切换</text>
    </g>
    <line x1="520" y1="170" x2="520" y2="181" stroke="#2196f3" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 4: Clip -->
  <g>
    <circle cx="730" cy="197" r="16" fill="#0f0c29" stroke="#7c4dff" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="730" y="202" font-size="14" text-anchor="middle" fill="#7c4dff">✂️</text>
    <g filter="url(#card-shadow)">
      <rect x="640" y="70" width="180" height="100" rx="14" fill="url(#c4)" stroke="#7c4dff" stroke-width="1.5"/>
      <text x="730" y="95" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#b388ff">模块 3</text>
      <text x="730" y="115" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#9966ff">智能剪辑</text>
      <text x="730" y="135" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#6633cc">识别精彩片段</text>
      <text x="730" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#6633cc">15-60 秒 · 保持质量</text>
    </g>
    <line x1="730" y1="170" x2="730" y2="181" stroke="#7c4dff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 5: Translate -->
  <g>
    <circle cx="940" cy="197" r="16" fill="#0f0c29" stroke="#e040fb" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="940" y="202" font-size="14" text-anchor="middle" fill="#e040fb">🌐</text>
    <g filter="url(#card-shadow)">
      <rect x="850" y="70" width="180" height="100" rx="14" fill="url(#c5)" stroke="#e040fb" stroke-width="1.5"/>
      <text x="940" y="95" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ea80fc">模块 4</text>
      <text x="940" y="115" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#cc44dd">多语言翻译</text>
      <text x="940" y="135" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#993399">中文 · 英文字幕</text>
      <text x="940" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#993399">保持时间同步</text>
    </g>
    <line x1="940" y1="170" x2="940" y2="181" stroke="#e040fb" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 6: Integrate -->
  <g>
    <circle cx="1150" cy="197" r="16" fill="#0f0c29" stroke="#1de9b6" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="1150" y="202" font-size="14" text-anchor="middle" fill="#1de9b6">📦</text>
    <g filter="url(#card-shadow)">
      <rect x="1070" y="85" width="160" height="80" rx="14" fill="url(#c6)" stroke="#1de9b6" stroke-width="1.5"/>
      <text x="1150" y="110" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#1de9b6">模块 5</text>
      <text x="1150" y="130" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#22aa88">整合输出</text>
      <text x="1150" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#116655">目录结构 · 摘要报告</text>
    </g>
    <line x1="1150" y1="165" x2="1150" y2="181" stroke="#1de9b6" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Node 7: Optional Embed -->
  <g>
    <circle cx="1360" cy="197" r="16" fill="#0f0c29" stroke="#ffc107" stroke-width="2" stroke-dasharray="4,3" filter="url(#icon-glow)"/>
    <text x="1360" y="202" font-size="14" text-anchor="middle" fill="#ffc107">🎨</text>
    <g filter="url(#card-shadow)">
      <rect x="1280" y="85" width="160" height="80" rx="14" fill="url(#c7)" stroke="#ffc107" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="1360" y="110" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ffd54f">可选</text>
      <text x="1360" y="130" font-family="'PingFang SC',sans-serif" font-size="12" text-anchor="middle" fill="#ccaa33">字幕嵌入</text>
      <text x="1360" y="150" font-family="'PingFang SC',sans-serif" font-size="10" text-anchor="middle" fill="#886622">烧录字幕到视频</text>
    </g>
    <line x1="1360" y1="165" x2="1360" y2="181" stroke="#ffc107" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- End marker -->
  <g>
    <circle cx="1520" cy="197" r="16" fill="#0f0c29" stroke="#76ff03" stroke-width="2.5" filter="url(#icon-glow)"/>
    <text x="1520" y="202" font-size="14" text-anchor="middle" fill="#76ff03">🎉</text>
  </g>

  <!-- ====== BOTTOM SECTION: OUTPUT + INFO ====== -->

  <!-- Separator -->
  <line x1="100" y1="250" x2="1500" y2="250" stroke="#7c4dff" stroke-width="0.5" opacity="0.2"/>

  <!-- Output section title -->
  <text x="800" y="280" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#e8e8e8" letter-spacing="3">📤 输出结果</text>

  <!-- Output items in a horizontal strip with icons -->
  <g transform="translate(0, 295)">
    <!-- Item 1: Clips -->
    <g filter="url(#card-shadow)">
      <rect x="80" y="0" width="280" height="75" rx="12" fill="#0d1220" stroke="#76ff0366" stroke-width="1"/>
      <circle cx="120" cy="37" r="22" fill="#76ff0315" stroke="#76ff03" stroke-width="1"/>
      <text x="120" y="43" font-size="18" text-anchor="middle">🎬</text>
      <text x="165" y="25" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#76ff03">剪辑视频</text>
      <text x="165" y="43" font-family="'PingFang SC',sans-serif" font-size="11" fill="#7a8a70">3-5 个精彩片段</text>
      <text x="165" y="60" font-family="'PingFang SC',sans-serif" font-size="10" fill="#556655">无损 · 保持原始质量</text>
    </g>

    <!-- Item 2: Subtitles -->
    <g filter="url(#card-shadow)">
      <rect x="390" y="0" width="280" height="75" rx="12" fill="#0d1220" stroke="#00e5ff44" stroke-width="1"/>
      <circle cx="430" cy="37" r="22" fill="#00e5ff15" stroke="#00e5ff" stroke-width="1"/>
      <text x="430" y="43" font-size="18" text-anchor="middle">📝</text>
      <text x="475" y="25" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#00e5ff">字幕文件</text>
      <text x="475" y="43" font-family="'PingFang SC',sans-serif" font-size="11" fill="#5588aa">中文 / 英文 / 原始语言</text>
      <text x="475" y="60" font-family="'PingFang SC',sans-serif" font-size="10" fill="#446688">SRT · 时间同步</text>
    </g>

    <!-- Item 3: Embedded video -->
    <g filter="url(#card-shadow)">
      <rect x="700" y="0" width="280" height="75" rx="12" fill="#0d1220" stroke="#e040fb44" stroke-width="1"/>
      <circle cx="740" cy="37" r="22" fill="#e040fb15" stroke="#e040fb" stroke-width="1"/>
      <text x="740" y="43" font-size="18" text-anchor="middle">🎞️</text>
      <text x="785" y="25" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#e040fb">嵌入字幕视频</text>
      <text x="785" y="43" font-family="'PingFang SC',sans-serif" font-size="11" fill="#aa55cc">可直接分享至社交平台</text>
      <text x="785" y="60" font-family="'PingFang SC',sans-serif" font-size="10" fill="#884499">(可选功能)</text>
    </g>

    <!-- Item 4: Report -->
    <g filter="url(#card-shadow)">
      <rect x="1010" y="0" width="280" height="75" rx="12" fill="#0d1220" stroke="#ffc10744" stroke-width="1"/>
      <circle cx="1050" cy="37" r="22" fill="#ffc10715" stroke="#ffc107" stroke-width="1"/>
      <text x="1050" y="43" font-size="18" text-anchor="middle">📊</text>
      <text x="1095" y="25" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="13" font-weight="700" fill="#ffc107">摘要报告</text>
      <text x="1095" y="43" font-family="'PingFang SC',sans-serif" font-size="11" fill="#aa8833">Markdown · 完整统计</text>
      <text x="1095" y="60" font-family="'PingFang SC',sans-serif" font-size="10" fill="#886622">元数据 · 处理日志</text>
    </g>
  </g>

  <!-- ====== PLATFORM + STATS FOOTER ====== -->
  <g transform="translate(0, 410)">
    <line x1="100" y1="0" x2="1500" y2="0" stroke="#00e5ff" stroke-width="0.5" opacity="0.15"/>

    <!-- Platform badges -->
    <g transform="translate(100, 20)">
      <text x="0" y="15" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="12" font-weight="600" fill="#5566aa" letter-spacing="2">支持平台</text>
      <rect x="100" y="0" width="100" height="28" rx="14" fill="none" stroke="#ff0000" stroke-width="1" opacity="0.6"/>
      <text x="150" y="19" font-family="'SF Pro Display',sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#ff4444">▶ YouTube</text>
      <rect x="220" y="0" width="90" height="28" rx="14" fill="none" stroke="#00f2ea" stroke-width="1" opacity="0.6"/>
      <text x="265" y="19" font-family="'SF Pro Display',sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#00f2ea">♪ TikTok</text>
      <rect x="330" y="0" width="90" height="28" rx="14" fill="none" stroke="#1da1f2" stroke-width="1" opacity="0.6"/>
      <text x="375" y="19" font-family="'SF Pro Display',sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#1da1f2">𝕏 Twitter</text>
    </g>

    <!-- Performance stats -->
    <g transform="translate(700, 20)">
      <text x="0" y="15" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="12" font-weight="600" fill="#5566aa" letter-spacing="2">性能指标</text>
      <text x="110" y="15" font-family="monospace" font-size="11" fill="#00e5ff">分析 ~6min/5min视频</text>
      <text x="340" y="15" font-family="monospace" font-size="11" fill="#7c4dff">剪辑 ~0.06s/片段</text>
      <text x="530" y="15" font-family="monospace" font-size="11" fill="#e040fb">翻译 ~17s/片段</text>
    </g>

    <!-- Core values -->
    <g transform="translate(100, 65)">
      <text x="0" y="15" font-family="'SF Pro Display','PingFang SC',sans-serif" font-size="12" font-weight="600" fill="#5566aa" letter-spacing="2">核心优势</text>
      <g transform="translate(100, 0)">
        <rect x="0" y="0" width="130" height="28" rx="6" fill="#00e67610" stroke="#00e676" stroke-width="0.5"/>
        <text x="65" y="19" font-family="'PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="#00e676">🚀 一键自动化</text>
      </g>
      <g transform="translate(250, 0)">
        <rect x="0" y="0" width="130" height="28" rx="6" fill="#2196f310" stroke="#2196f3" stroke-width="0.5"/>
        <text x="65" y="19" font-family="'PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="#64b5f6">🧠 AI 智能识别</text>
      </g>
      <g transform="translate(400, 0)">
        <rect x="0" y="0" width="130" height="28" rx="6" fill="#e040fb10" stroke="#e040fb" stroke-width="0.5"/>
        <text x="65" y="19" font-family="'PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="#ea80fc">🌍 多语言支持</text>
      </g>
      <g transform="translate(550, 0)">
        <rect x="0" y="0" width="130" height="28" rx="6" fill="#ffc10710" stroke="#ffc107" stroke-width="0.5"/>
        <text x="65" y="19" font-family="'PingFang SC',sans-serif" font-size="11" text-anchor="middle" fill="#ffd54f">⚡ 极速处理</text>
      </g>
    </g>
  </g>

  <!-- Version -->
  <text x="1550" y="545" font-family="monospace" font-size="9" text-anchor="end" fill="#333" opacity="0.3">v2.0 · 2026.03</text>
</svg>
