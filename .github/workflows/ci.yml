name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install linters
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Lint with ruff
      run: |
        ruff check . --output-format=github

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Install requirements, skipping macOS-only packages
        grep -v 'pyobjc' requirements.txt > requirements_ci.txt
        pip install -r requirements_ci.txt
        pip install pytest pytest-cov

    - name: Run unit tests
      run: |
        pytest tests/ \
          -m "not e2e and not slow" \
          --cov=. \
          --cov-config=.coveragerc \
          --cov-report=term-missing \
          -v \
          --ignore=tests/test_e2e.py

    - name: Verify core imports
      run: |
        python -c "from downloader import Downloader; print('✓ downloader')"
        python -c "from analyzer import Analyzer; print('✓ analyzer')"
        python -c "from clipper import Clipper; print('✓ clipper')"
        python -c "from translator import Translator; print('✓ translator')"
        python -c "from integrator import Integrator; print('✓ integrator')"
        echo "All core modules imported successfully"
